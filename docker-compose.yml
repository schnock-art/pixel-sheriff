services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-pixel_sheriff}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-pixel_sheriff}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JOB_QUEUE_KEY: ${JOB_QUEUE_KEY:-pixel_sheriff:train_jobs:v1}
      STORAGE_ROOT: /app/data
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TRAINER_INFERENCE_BASE_URL: ${TRAINER_INFERENCE_BASE_URL:-http://trainer:8020}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./data:/app/data

  trainer:
    build:
      context: .
      dockerfile: apps/trainer/Dockerfile
      args:
        PYTORCH_INDEX_URL: ${TRAINER_PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cu129}
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JOB_QUEUE_KEY: ${JOB_QUEUE_KEY:-pixel_sheriff:train_jobs:v1}
      STORAGE_ROOT: /app/data
      TRAINER_POLL_SECONDS: ${TRAINER_POLL_SECONDS:-5}
      TRAINER_INFERENCE_PORT: ${TRAINER_INFERENCE_PORT:-8020}
      INFERENCE_CACHE_MAX_MODELS_GPU: ${INFERENCE_CACHE_MAX_MODELS_GPU:-1}
      INFERENCE_CACHE_MAX_MODELS_CPU: ${INFERENCE_CACHE_MAX_MODELS_CPU:-3}
      INFERENCE_CACHE_TTL_SECONDS: ${INFERENCE_CACHE_TTL_SECONDS:-600}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    depends_on:
      - redis
      - db
    volumes:
      - ./data:/app/data
    expose:
      - "${TRAINER_INFERENCE_PORT:-8020}"
    gpus: ${TRAINER_GPUS:-all}
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_PORT:-8000}
      INTERNAL_API_BASE_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
